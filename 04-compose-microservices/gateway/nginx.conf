# API gateway / reverse proxy.
# A single public entrypoint (host:8080) routes to the right microservice by
# URL prefix. Clients never talk to services directly, and services aren't
# published to the host — the gateway is the only door in.
upstream auth    { server auth-service:5001; }
upstream catalog { server catalog-service:8080; }
upstream orders  { server order-service:5002; }

server {
    listen 80;
    server_name _;

    location /api/auth/ {
        proxy_pass http://auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/catalog/ {
        proxy_pass http://catalog/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/orders/ {
        proxy_pass http://orders/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = / {
        default_type application/json;
        return 200 '{"gateway":"up","routes":["/api/auth","/api/catalog","/api/orders"]}';
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
