# nginx serves the built React static files AND reverse-proxies /api to the
# backend container. The frontend never needs to know the backend's address —
# Docker's internal DNS resolves the service name "api".
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown routes return index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy to the Express API service.
    location /api/ {
        proxy_pass http://api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Lightweight endpoint for the container HEALTHCHECK.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
